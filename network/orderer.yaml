# ---------------------------------------------------------------------------
# orderer.yaml — Ordering node configuration
# ---------------------------------------------------------------------------

General:
  ListenAddress: 0.0.0.0
  ListenPort: 7050
  TLS:
    Enabled: true
    PrivateKey: /etc/hyperledger/fabric/tls/server.key
    Certificate: /etc/hyperledger/fabric/tls/server.crt
    RootCAs:
      - /etc/hyperledger/fabric/tls/ca.crt
    ClientAuthRequired: false
    ClientRootCAs:
  Keepalive:
    ServerMinInterval: 60s
    ServerInterval: 7200s
    ServerTimeout: 20s
  Cluster:
    ListenAddress: 0.0.0.0
    ListenPort: 0
    ServerCertificate:
    ServerPrivateKey:
    ClientCertificate:
    ClientPrivateKey:
    RootCAs:
      - /etc/hyperledger/fabric/tls/ca.crt
    DialTimeout: 5s
    RPCTimeout: 7s
    ReplicationBufferSize: 20971520
    ReplicationPullTimeout: 5s
    ReplicationRetryTimeout: 5s
    ReplicationBackgroundRefreshInterval: 5m0s
    ReplicationMaxRetries: 12
    SendBufferSize: 10
    CertExpirationWarningThreshold: 168h0m0s
    TLSHandshakeTimeShift: 0s
  BootstrapMethod: file
  BootstrapFile: /etc/hyperledger/fabric/genesis.block
  LocalMSPDir: /etc/hyperledger/fabric/msp
  LocalMSPID: OrdererMSP
  BCCSP:
    Default: SW
    SW:
      Hash: SHA2
      Security: 256
      FileKeyStore:
        KeyStore:
  Authentication:
    TimeWindow: 15m

FileLedger:
  Location: /var/hyperledger/production/orderer

Debug:
  BroadcastTraceDir:
  DeliverTraceDir:

Consensus:
  WALDir: /var/hyperledger/production/orderer/etcdraft/wal
  SnapDir: /var/hyperledger/production/orderer/etcdraft/snapshot

Operations:
  ListenAddress: 127.0.0.1:8443
  TLS:
    Enabled: false

Metrics:
  Provider: disabled
  Statsd:
    Network: udp
    Address: 127.0.0.1:8125
    WriteInterval: 30s
    Prefix:

Admin:
  ListenAddress: 127.0.0.1:9443
  TLS:
    Enabled: false

ChannelParticipation:
  Enabled: true
  MaxRequestBodySize: 1 MB
