networks:
  fabric-net:
    name: fabric-net
    driver: bridge

services:
  orderer.landreg.com:
    container_name: orderer.landreg.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/etc/hyperledger/fabric/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/etc/hyperledger/fabric/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/etc/hyperledger/fabric/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/etc/hyperledger/fabric/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/etc/hyperledger/fabric/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/etc/hyperledger/fabric/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/etc/hyperledger/fabric/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/etc/hyperledger/fabric/genesis.block
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
    working_dir: /root
    command: orderer
    volumes:
      - ./organizations/ordererOrganizations/landreg.com/orderers/orderer.landreg.com/msp:/etc/hyperledger/fabric/msp:z
      - ./organizations/ordererOrganizations/landreg.com/orderers/orderer.landreg.com/tls:/etc/hyperledger/fabric/tls:z
      - ./channel-artifacts/genesis.block:/etc/hyperledger/fabric/genesis.block:z
      - orderer.landreg.com:/var/hyperledger/production/orderer
    ports: ["7050:7050", "7053:7053"]
    networks: [fabric-net]
  peer0.landreg.com:
    container_name: peer0.landreg.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.landreg.com
      - CORE_PEER_ADDRESS=peer0.landreg.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.landreg.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.landreg.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.landreg.com:7051
      - CORE_PEER_LOCALMSPID=LandRegMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-net
      - CORE_LEDGER_STATE_STATEDATABASE=goleveldb
      - CORE_PEER_GATEWAY_ENABLED=true
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/landreg.com/peers/peer0.landreg.com/msp:/etc/hyperledger/fabric/msp:z
      - ./organizations/peerOrganizations/landreg.com/peers/peer0.landreg.com/tls:/etc/hyperledger/fabric/tls:z
      - peer0.landreg.com:/var/hyperledger/production
    ports: ["7051:7051", "7052:7052"]
    depends_on: [orderer.landreg.com]
    networks: [fabric-net]
  peer1.landreg.com:
    container_name: peer1.landreg.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer1.landreg.com
      - CORE_PEER_ADDRESS=peer1.landreg.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer1.landreg.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.landreg.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.landreg.com:8051
      - CORE_PEER_LOCALMSPID=LandRegMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-net
      - CORE_LEDGER_STATE_STATEDATABASE=goleveldb
      - CORE_PEER_GATEWAY_ENABLED=true
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/landreg.com/peers/peer1.landreg.com/msp:/etc/hyperledger/fabric/msp:z
      - ./organizations/peerOrganizations/landreg.com/peers/peer1.landreg.com/tls:/etc/hyperledger/fabric/tls:z
      - peer1.landreg.com:/var/hyperledger/production
    ports: ["8051:8051", "8052:8052"]
    depends_on: [orderer.landreg.com]
    networks: [fabric-net]
  peer2.landreg.com:
    container_name: peer2.landreg.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer2.landreg.com
      - CORE_PEER_ADDRESS=peer2.landreg.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer2.landreg.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.landreg.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer2.landreg.com:9051
      - CORE_PEER_LOCALMSPID=LandRegMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric-net
      - CORE_LEDGER_STATE_STATEDATABASE=goleveldb
      - CORE_PEER_GATEWAY_ENABLED=true
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/landreg.com/peers/peer2.landreg.com/msp:/etc/hyperledger/fabric/msp:z
      - ./organizations/peerOrganizations/landreg.com/peers/peer2.landreg.com/tls:/etc/hyperledger/fabric/tls:z
      - peer2.landreg.com:/var/hyperledger/production
    ports: ["9051:9051", "9052:9052"]
    depends_on: [orderer.landreg.com]
    networks: [fabric-net]
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.landreg.com:7051
      - CORE_PEER_LOCALMSPID=LandRegMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/landreg.com/peers/peer0.landreg.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/landreg.com/users/Admin@landreg.com/msp
      - ORDERER_CA=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/ordererOrganizations/landreg.com/orderers/orderer.landreg.com/msp/tlscacerts/tlsca.landreg.com-cert.pem
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations:/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations:z
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts:z
      - ../backend/chaincode:/opt/gopath/src/github.com/hyperledger/fabric/peer/chaincode:z
    depends_on:
      - peer0.landreg.com
      - peer1.landreg.com
      - peer2.landreg.com
    networks: [fabric-net]
  backend:
    container_name: landreg-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ndhack-backend:latest
    environment:
      - DOCKER_ENV=1
      - FABRIC_ORG=landreg
      - FABRIC_USER=Admin
      - GATEWAY_PEER=peer0.landreg.com:7051
      - CRYPTO_PATH=/organizations
      - PEER_TLS_CA_CERT=/organizations/peerOrganizations/landreg.com/peers/peer0.landreg.com/tls/ca.crt
      - PROJECT_ROOT=/
      - DB_PATH=/app/data/landreg.db
    volumes:
      - ./organizations:/organizations:ro,z
    ports: ["8080:8080"]
    depends_on:
      - peer0.landreg.com
      - peer1.landreg.com
      - peer2.landreg.com
    networks: [fabric-net]
  frontend:
    container_name: landreg-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: ndhack-frontend:latest
    environment:
      - BACKEND_URL=http://backend:8080
    ports: ["3000:3000"]
    depends_on: [backend]
    networks: [fabric-net]

volumes:
  orderer.landreg.com:
  peer0.landreg.com:
  peer1.landreg.com:
  peer2.landreg.com:
