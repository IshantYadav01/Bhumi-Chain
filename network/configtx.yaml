---
Organizations:
  - &LandReg
    Name: LandregMSP
    ID: LandregMSP
    MSPDir: organizations/peerOrganizations/landreg.com/msp
    Policies:
      Readers:
        {
          Type: Signature,
          Rule: "OR('LandregMSP.admin','LandregMSP.peer','LandregMSP.client')",
        }
      Writers:
        { Type: Signature, Rule: "OR('LandregMSP.admin','LandregMSP.client')" }
      Admins: { Type: Signature, Rule: "OR('LandregMSP.admin')" }
      Endorsement: { Type: Signature, Rule: "OR('LandregMSP.peer')" }
    AnchorPeers:
      - Host: peer0.landreg.com
        Port: 7051
Capabilities:
  Channel: &ChannelCapabilities { V2_0: true }
  Orderer: &OrdererCapabilities { V2_0: true }
  Application: &ApplicationCapabilities { V2_5: true }
Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers: { Type: ImplicitMeta, Rule: "ANY Readers" }
    Writers: { Type: ImplicitMeta, Rule: "ANY Writers" }
    Admins: { Type: ImplicitMeta, Rule: "MAJORITY Admins" }
    LifecycleEndorsement: { Type: ImplicitMeta, Rule: "MAJORITY Endorsement" }
    Endorsement: { Type: Signature, Rule: "OR('LandregMSP.peer')" }
  Capabilities: *ApplicationCapabilities
Orderer: &OrdererDefaults
  OrdererType: etcdraft
  EtcdRaft:
    Consenters:
      - Host: orderer.landreg.com
        Port: 7050
        ClientTLSCert: organizations/ordererOrganizations/landreg.com/orderers/orderer.landreg.com/tls/server.crt
        ServerTLSCert: organizations/ordererOrganizations/landreg.com/orderers/orderer.landreg.com/tls/server.crt
  Addresses: [orderer.landreg.com:7050]
  BatchTimeout: 2s
  BatchSize:
    { MaxMessageCount: 10, AbsoluteMaxBytes: 99 MB, PreferredMaxBytes: 512 KB }
  Organizations:
  Policies:
    Readers: { Type: ImplicitMeta, Rule: "ANY Readers" }
    Writers: { Type: ImplicitMeta, Rule: "ANY Writers" }
    Admins: { Type: ImplicitMeta, Rule: "MAJORITY Admins" }
    BlockValidation: { Type: ImplicitMeta, Rule: "ANY Writers" }
  Capabilities: *OrdererCapabilities
Channel: &ChannelDefaults
  Policies:
    Readers: { Type: ImplicitMeta, Rule: "ANY Readers" }
    Writers: { Type: ImplicitMeta, Rule: "ANY Writers" }
    Admins: { Type: ImplicitMeta, Rule: "MAJORITY Admins" }
  Capabilities: *ChannelCapabilities
Profiles:
  OrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - &OrdererOrg
          Name: OrdererOrg
          ID: OrdererMSP
          MSPDir: organizations/ordererOrganizations/landreg.com/msp
          Policies:
            Readers: { Type: Signature, Rule: "OR('OrdererMSP.member')" }
            Writers: { Type: Signature, Rule: "OR('OrdererMSP.member')" }
            Admins: { Type: Signature, Rule: "OR('OrdererMSP.admin')" }
          OrdererEndpoints: [orderer.landreg.com:7050]
      Capabilities: *OrdererCapabilities
    Consortiums:
      LandConsortium:
        Organizations:
          - *LandReg
  LandChannel:
    Consortium: LandConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *LandReg
      Capabilities: *ApplicationCapabilities
